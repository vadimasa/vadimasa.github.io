<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Видео</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        video {
            width: 100%;
            height: auto;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <video 
        id="myVideo" autoplay muted playsinline loop>
        <!-- Укажите правильное имя вашего видеофайла -->
        <source src="video.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>
    
    <button id="unmuteBtn">Включить звук</button>
    
    <script>
        const video = document.getElementById('myVideo');
        const btn = document.getElementById('unmuteBtn');
        btn.addEventListener('click', () => {
        video.muted = false;
        btn.style.display = 'none';
        });
    </script>
</body>
</html>
